<html>
<head>
<title>Hot Beans - Home</title>
<link rel="icon" href="HOT BEANS FAVICON.ico" type="image/x-icon">
<style>
body {
  margin: 0;
  padding: 0;
}

ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: showing;
  background-color: #333333;
}

ul li {
  float: right;
}

ul li a {
  display: block;
  color: white;
  text-align: center;
  padding: 40px 55px;
  text-decoration: none;
}

ul li a:hover {
  background-color: #111111;
}

img {
  display: block;
  margin-left: auto;
  margin-right: auto;
}

.code-img {
  display: block;
  margin: 10px;
  margin-left: auto;
  margin-right: auto;
}

* {
  box-sizing: border-box;
}

.box {
    width: 850px;
    height: 70px;
    background-color: #4CAF50;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    border-radius: 8px;
}

.center {
  display: flex;
  justify-content: center;
  align-items: center;
}

.left {
  display: flex;
  justify-content: left;
  align-items: left;
}

.center-text {
  text-align: center;
}

button {
  background: none;
  border: none;
  padding: 5px 10px;
  font-size: 16px;
  border-radius: 8px;
  color: gray;
  font-size: 12px;
}

#secretImage {
    display: none;
    width: 300px;
}

.center-container {
  text-align: center;
  margin-top: 0px;
}
</style>
</head>
<body style="background-color:#B59778;">

<ul>  
  <li><a href="Hot Beans Courses Page.htm" style="color:orange;font-family:trebuchet ms">Courses</a></li>
  <li><a href="Hot Beans Jobs Page.htm" style="color:red;font-family:trebuchet ms">Jobs</a></li>
  <li><a href="Hot Beans Meet the Team Page.htm" style="color:orange;font-family:trebuchet ms">Meet the Team</a></li>
  <li><a href="Hot Beans About Page.htm" style="color:red;font-family:trebuchet ms">About</a></li>
  <li><a href="Hot Beans Home Page.htm" style="color:orange;font-family:trebuchet ms">Home</a></li>
</ul>

<div style="width:100%;height:100px;background-color: #333333;color:white">
<img src="HOT BEANS.png" alt="logo" width="120" height="100">
<h3 style="text-align: center;">
<span style="color:red;font-family:trebuchet ms">Welcome to the official</span>
<span style="color:orange;font-family:trebuchet ms">Hot Beans website!</span>
</h3>
<div style="width:10%;float:right;">
</div>

<img src="html_code.png" alt="code" class="code-img" width="900" height="500">

<div class="center">
  <div class="box" style="background-color:#F76745">
  <p style="color:black;font-family:trebuchet ms" class="center-text">This is the official website for Hot Beans Website Development! Use the menu on the top right to navigate to other parts of the site. Thank you for coming by!</p>
  </div>
</div>

<button id="secretButton" onclick="toggleImage()">???</button>

<img id="secretImage" src="secret_image.png" alt="Surprise!">

<audio id="congratulations" preload="auto">
    <source src="congratulations.mp3" type="audio/mpeg">
</audio>

<script>
    const button = document.getElementById("secretButton");
    const image = document.getElementById("secretImage");
    const sound = document.getElementById("congratulations");

    button.addEventListener("click", () => {
        sound.currentTime = 0; 
        sound.play().catch(err => {
            console.log("Audio failed:", err);
        });
        image.style.display = "block";
    });
</script>

</body>
</html>
